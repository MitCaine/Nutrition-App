[alembic]
script_location = app/control_migrations
prepend_sys_path = .
# There is deliberately no sqlalchemy.url fallback.  The environment requires
# NUTRITION_CONTROL_MIGRATION_DATABASE_URL explicitly.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
