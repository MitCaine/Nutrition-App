services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nutrition_app
      POSTGRES_USER: nutrition_app
      POSTGRES_PASSWORD: nutrition_app
    ports:
      - "5432:5432"
    volumes:
      - nutrition_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrition_app -d nutrition_app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nutrition_postgres_data:
